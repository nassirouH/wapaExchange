name: admin-deploy

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/admin-deploy.yml'

env:
  AWS_REGION: eu-west-3
  BUCKET: ${{ secrets.ADMIN_S3_BUCKET }}
  DISTRIBUTION_ID: ${{ secrets.ADMIN_CLOUDFRONT_ID }}
  NEXT_PUBLIC_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - run: npm ci
      - name: Build static site
        run: NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync ./out "s3://$BUCKET" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
